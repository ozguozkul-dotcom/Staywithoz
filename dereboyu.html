<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay with Oz</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .slideshow-container {
            position: relative;
            max-width: 100%;
            margin: auto;
        }
        .mySlides {
            display: none;
        }
        img {
            width: 100%; /* Responsive */
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Stay with Oz</h1>
    </header>

    <section>
        <h2>Hero Images</h2>
        <div class="slideshow-container">
            <div class="mySlides fade">
                <img src="dereboyumain.jpg" alt="Hero Image 1">
            </div>
            <div class="mySlides fade">
                <img src="dereboyumain2.jpg" alt="Hero Image 2">
            </div>
            <div class="mySlides fade">
                <img src="dereboyumain3.jpg" alt="Hero Image 3">
            </div>
        </div>
        <script>
            var slideIndex = 0;
            showSlides();
            function showSlides() {
                var i;
                var slides = document.getElementsByClassName("mySlides");
                for (i = 0; i < slides.length; i++) {
                    slides[i].style.display = "none";  
                }
                slideIndex++;
                if (slideIndex > slides.length) {slideIndex = 1;}    
                slides[slideIndex-1].style.display = "block";  
                setTimeout(showSlides, 2000); // Change image every 2 seconds
            }
        </script>
    </section>

    <section>
        <h2>House Rules</h2>
        <p>Çöp konteynerlerinin yeri: <img src="cop.png" alt="Çöp Konteyneri" /></p>
        <p>Yeni kural: Çöpü çöplüğe çıkarınız.</p>
    </section>

    <section>
        <h2>Hot Water Information</h2>
        <p>Duşta sıcak su için sağ odada olan fişi açarak şofbeni kullanabilirsiniz.</p>
        <img src="su.jpg" alt="Su" style="width: 30%;"/>
    </section>

    <footer>
        <p>Contact us for more information.</p>
    </footer>
</body>
</html>
